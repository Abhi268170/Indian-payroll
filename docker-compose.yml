name: indian-payroll

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/Payroll.Api/Dockerfile
      target: final
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Payroll: "Host=pgbouncer;Port=5432;Database=payroll;Username=payroll;Password=${DB_PASSWORD};No Reset On Close=true;Max Auto Prepare=0;CommandTimeout=30"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD}"
      Email__Host: mailhog
      Email__Port: "1025"
      Email__UseSsl: "false"
      Storage__Minio__Endpoint: "minio:9000"
      Storage__Minio__AccessKey: "payroll"
      Storage__Minio__SecretKey: "${MINIO_PASSWORD}"
      Storage__Minio__BucketName: "payroll"
      Storage__Minio__UseHttps: "false"
    secrets:
      - db_password
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: src/Payroll.Api/Dockerfile
      target: final
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Payroll: "Host=pgbouncer;Port=5432;Database=payroll;Username=payroll;No Reset On Close=true;Max Auto Prepare=0"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD}"
      Hangfire__WorkerOnly: "true"
    secrets:
      - db_password
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payroll
      POSTGRES_USER: payroll
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payroll -d payroll"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: payroll
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_NAME: payroll
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "25"
      SERVER_IDLE_TIMEOUT: "600"
      IGNORE_STARTUP_PARAMETERS: search_path
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --requirepass "${REDIS_PASSWORD}"
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: payroll
      MINIO_ROOT_PASSWORD: "${MINIO_PASSWORD}"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD}"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:3.3.2
    volumes:
      - ./monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - lokidata:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
  prometheusdata:
  grafanadata:
  lokidata:

secrets:
  db_password:
    file: ./secrets/db_password.txt
